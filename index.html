<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Medical | Quiet Luxury Healthcare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A;
            --accent: #0D9488;
            --bg: #FDFCF6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .view-transition {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-shape-1 {
            position: absolute;
            top: 5rem;
            right: -10%;
            width: 600px;
            height: 600px;
            background: #f0fdfa;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            z-index: -1;
        }

        .hero-shape-2 {
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: #eff6ff;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: -1;
        }

        .bento-card {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 32px;
            transition: all 0.5s ease;
        }

        .bento-card:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            transform: translateY(-4px);
        }

        .btn-aura {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .btn-aura::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn-aura:hover::after {
            transform: translateY(0);
        }

        /* Improved Dropdown Bridge */
        .dropdown-menu::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
        }

        /* Hero Slider Animations */
        .slider-item {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slider-item.active {
            opacity: 1;
        }

        /* Date Input Styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.4);
        }

        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>

    <!-- Navbar (Changed to fixed with transitions) -->
    <nav id="navbar"

                <div

                    <i data-lucide="activity" class="text-white w-4 h-4 md:w-5 md:h-5"></i>
                </div>
                <span class="text-lg md:text-xl font-serif font-bold tracking-tight text-[#0F172A]">AURA <span
                        class="text-teal-600">MEDICAL</span></span>
            </div>

            <div class="hidden lg:flex items-center gap-10">
                <button onclick="renderView('home')"
                    class="text-sm font-semibold text-slate-500 hover:text-teal-600 transition-colors uppercase tracking-widest">Discover</button>
                <button onclick="renderView('doctors')"
                    class="text-sm font-semibold text-slate-500 hover:text-teal-600 transition-colors uppercase tracking-widest">Directory</button>
                <button onclick="handleDashboardNavigation()"

            </div>

                <div id="auth-section" class="flex items-center gap-4">

                </div>
                <!-- Mobile Menu Button -->
                <button onclick="toggleMobileMenu()" class="lg:hidden p-2 text-[#0F172A]">
                    <i data-lucide="menu" id="menu-icon" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Nav Menu Overlay -->
        <div id="mobile-menu"
            class="fixed inset-0 bg-[#FDFCF6] z-[110] translate-x-full lg:hidden flex flex-col p-8 space-y-8 overflow-y-auto pb-24">
            <div class="flex justify-between items-center">
                <span class="text-xl font-serif font-bold text-[#0F172A]">AURA</span>
                <button onclick="toggleMobileMenu()" class="p-2"><i data-lucide="x" class="w-8 h-8"></i></button>
            </div>
            <div class="flex flex-col space-y-6">
                <button onclick="renderView('home'); toggleMobileMenu();"
                    class="text-2xl font-serif text-left text-slate-900 border-b border-slate-100 pb-4">Discover</button>
                <button onclick="renderView('doctors'); toggleMobileMenu();"
                    class="text-2xl font-serif text-left text-slate-900 border-b border-slate-100 pb-4">Directory</button>
                <button onclick="handleDashboardNavigation(); toggleMobileMenu();"
                    class="text-2xl font-serif text-left text-slate-900 border-b border-slate-100 pb-4">My Aura</button>
                <div id="mobile-auth-btn-container" class="flex flex-col space-y-6"></div>
            </div>
        </div>
    </nav>

            { id: 12, name: "Dr. Clara Barton", specialty: "Senior Care Specialist", rating: 4.9, reviews: 112, experience: "25 Years", location: "Greenwich, CT", price: "₹350", image: "https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=600", about: "Dedicated to healthy aging and longevity protocols for legacy families.", slots: ["09:00 AM", "11:30 AM"] },
            { id: 13, name: "Dr. Arthur Vance", specialty: "Heart Specialist", rating: 4.8, reviews: 190, experience: "20 Years", location: "Financial District, NY", price: "₹380", image: "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=600&sig=13", about: "A pioneer in preventive cardiology and longevity-focused heart health.", slots: ["10:00 AM", "03:00 PM"] },
            { id: 14, name: "Dr. Isabella Silva", specialty: "Joint & Arthritis Specialist", rating: 4.9, reviews: 75, experience: "10 Years", location: "Chelsea, NY", price: "₹290", image: "https://images.unsplash.com/photo-1594824476967-48c8b964273f?w=600&sig=14", about: "Specializing in autoimmune management and joint longevity therapy.", slots: ["11:00 AM", "01:00 PM"] },
            { id: 15, name: "Dr. Kevin Zhang", specialty: "Brain & Nerve Specialist", rating: 5.0, reviews: 230, experience: "16 Years", location: "Battery Park, NY", price: "₹420", image: "https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=600&sig=15", about: "Leading researcher in cognitive decline prevention and neurological optimization.", slots: ["08:30 AM", "04:30 PM"] }
        ];

        let APP_STATE = {
            currentUser: null,
            users: [],
            appointments: [
                { id: 101, doctorId: 3, patientName: "Demo Member", slot: "10:00 AM", status: "Confirmed", date: "2023-10-25", type: "Brain Assessment" }
            ]
        };

        const savedState = localStorage.getItem('AURA_APP_STATE');
        if (savedState) {
            try {
                APP_STATE = JSON.parse(savedState);
            } catch (e) {
                console.error("Failed to parse saved state", e);
            }
        }

        function saveState() {
            localStorage.setItem('AURA_APP_STATE', JSON.stringify(APP_STATE));
        }

        // --- Auth & State Helpers ---
        function updateAuthUI() {
            const authSection = document.getElementById('auth-section');
            if (window.currentView && window.currentView.includes('_')) {
                authSection.innerHTML = '';
                return;
            }
            if (!APP_STATE.currentUser) {
                authSection.innerHTML = `
                    <div class="hidden lg:flex items-center gap-3 md:gap-6">
                        <button onclick="renderView('signup')" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-teal-600 transition-colors">Register</button>
                        <div class="relative group">
                            <button class="btn-aura bg-[#0F172A] text-white px-4 md:px-8 py-2 md:py-3 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-widest shadow-xl">Sign In</button>
                            <div class="dropdown-menu absolute right-[-1rem] sm:right-0 top-full mt-4 w-64 max-w-[calc(100vw-2rem)] bg-white rounded-3xl shadow-2xl border border-slate-100 p-3 hidden group-hover:block animate-in fade-in slide-in-from-top-2">
                                <div class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Select Portal</div>
                                <button onclick="renderView('login', {role: 'patient'})" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-50 flex items-center gap-3 group/item mb-1">
                                    <div class="w-8 h-8 rounded-full bg-teal-50 text-teal-600 flex items-center justify-center"><i data-lucide="user" class="w-4 h-4"></i></div>
                                    <div class="text-xs font-bold text-slate-600">Patient Access</div>
                                </button>
                                <div class="border-t border-slate-50 my-2"></div>
                                <div class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Physician Network</div>
                                <div class="space-y-1 max-h-48 overflow-y-auto pr-1">
                                    ${DOCTORS.map(doc => `<button onclick="renderView('login', {role: 'doctor', id: ${doc.id}})" class="w-full text-left px-4 py-2 rounded-xl hover:bg-indigo-50 flex items-center gap-3"><img src="${doc.image}" class="w-6 h-6 rounded-full object-cover" /><div class="text-[10px] font-bold text-slate-500">${doc.name}</div></button>`).join('')}
                                </div>
                                <div class="border-t border-slate-50 my-2"></div>
                                <button onclick="renderView('login', {role: 'admin'})" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-50 flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center"><i data-lucide="settings" class="w-4 h-4"></i></div><div class="text-xs font-bold text-slate-600">Administration</div></button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                const role = APP_STATE.currentUser.role;
                const roleColors = { patient: 'text-teal-600', doctor: 'text-indigo-600', admin: 'text-slate-600' };
                authSection.innerHTML = `
                    <div class="relative group cursor-pointer" onclick="handleDashboardNavigation()">
                        <button class="p-1 md:p-2 pl-3 md:pl-4 pr-2 md:pr-3 text-slate-400 hover:text-teal-600 transition-colors bg-white rounded-full border border-slate-100 flex items-center gap-2 md:gap-3">

                                <div class="text-[10px] font-bold uppercase tracking-widest ${roleColors[role]}">${role}</div>
                                <div class="text-[9px] text-slate-400 font-medium">${APP_STATE.currentUser.name}</div>
                            </div>
                            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-slate-50 flex items-center justify-center"><i data-lucide="user" class="w-3 h-3 md:w-4 md:h-4"></i></div>
                        </button>
                    </div>

            }

            const mobileAuthContainer = document.getElementById('mobile-auth-btn-container');

                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Patient Portal</div>
                        <button onclick="renderView('signup'); toggleMobileMenu();" class="text-2xl font-serif text-left text-teal-600 pb-2">Register</button>
                        <button onclick="renderView('login', {role: 'patient'}); toggleMobileMenu();" class="text-2xl font-serif text-left text-[#0F172A] pb-6">Sign In</button>
                        
                        <div class="h-[1px] w-full bg-slate-100 mb-6"></div>

                        </button>
                        <div id="mobile-doctors-list" class="hidden space-y-4 max-h-[30vh] overflow-y-auto pr-2 pb-6">

                } else {

                        <button onclick="logout(); toggleMobileMenu();" class="text-2xl font-serif text-left text-red-500">Sign Out</button>
                    `;
                }
            }

            lucide.createIcons();
        }

        function showToast(title, message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `w-full sm:min-w-[300px] sm:max-w-sm bg-white border border-slate-100 shadow-2xl rounded-2xl p-4 flex gap-4 items-start animate-in slide-in-from-bottom-5 fade-in duration-300 pointer-events-auto relative overflow-hidden transition-all`;
            toast.innerHTML = `
                <div class="absolute left-0 top-0 bottom-0 w-1.5 ${isError ? 'bg-red-500' : 'bg-teal-500'}"></div>
                <div class="w-8 h-8 rounded-full ${isError ? 'bg-red-50 text-red-500' : 'bg-teal-50 text-teal-600'} flex items-center justify-center flex-shrink-0 mt-0.5">
                    <i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i>
                </div>
                <div class="flex-1">
                    <h4 class="text-sm font-bold text-slate-900">${title}</h4>
                    <p class="text-xs text-slate-500 mt-1 leading-relaxed">${message}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-slate-600 transition-colors mt-0.5"><i data-lucide="x" class="w-4 h-4"></i></button>
            `;
            container.appendChild(toast);
            if (window.lucide) lucide.createIcons({ root: toast });
            setTimeout(() => { if (toast.parentElement) { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); } }, 5000);
        }

        function handleLoginSubmit(e, role, doctorId) {
            e.preventDefault();
            if (role === 'patient') {
                const email = document.getElementById('login-email').value;
                const user = APP_STATE.users.find(u => u.email === email);
                if (user) {
                    APP_STATE.currentUser = user;
                    saveState();
                    showToast('Verification Successful', 'Welcome back to your secure patient portal.');
                    updateAuthUI();
                    handleDashboardNavigation();
                } else {
                    showToast('Access Denied', 'Account not found. Please register first.', true);
                }
            } else {
                const code = document.getElementById('login-code').value;
                if (role === 'doctor' && code !== '1234') {
                    showToast('Authentication Failed', 'Invalid authorization code.', true);
                    return;
                } else if (role === 'admin' && code !== '1234') {
                    showToast('Authentication Failed', 'Invalid administrator access key.', true);
                    return;
                }
                if (role === 'doctor') {
                    const doc = DOCTORS.find(d => d.id === doctorId);
                    APP_STATE.currentUser = { role: 'doctor', id: doc.id, name: doc.name };
                    saveState();
                    showToast('Verification Successful', `${doc.name}, welcome to your clinical dashboard.`);
                } else {
                    APP_STATE.currentUser = { role: 'admin', name: 'System Controller' };
                    saveState();
                    showToast('Verification Successful', 'Administrative privileges granted.');
                }
                updateAuthUI();
                handleDashboardNavigation();
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            if (APP_STATE.users.some(u => u.email === email)) {
                showToast('Registration Blocked', 'An account with this email already exists. Please log in instead.', true);
                return;
            }

            const newUser = { name, email, password, role: 'patient' };
            APP_STATE.users.push(newUser);
            APP_STATE.currentUser = newUser;
            saveState();
            updateAuthUI();
            showToast('Registration Successful', 'Welcome to the Aura Medical network.');
            renderView('patient_dashboard');
        }

        function logout() { APP_STATE.currentUser = null; saveState(); updateAuthUI(); renderView('home'); }

        function handleDashboardNavigation() {
            if (!APP_STATE.currentUser) return renderView('home');
            renderView(`${APP_STATE.currentUser.role}_dashboard`);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('translate-x-full')) {
                menu.classList.remove('translate-x-full');
            } else {
                menu.classList.add('translate-x-full');
            }
        }

        // --- View Rendering ---
        function renderView(view, params = null) {

                if (view.startsWith('admin_') && APP_STATE.currentUser.role !== 'admin') view = 'home';
                if (view.startsWith('patient_') && APP_STATE.currentUser.role !== 'patient') view = 'home';
            }

            const container = document.getElementById('app-container');
            container.innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.currentView = view;
            const viewDiv = document.createElement('div');
            viewDiv.className = 'view-transition';

            switch (view) {
                case 'home': viewDiv.innerHTML = renderHome(); startHeroSlider(); break;
                case 'doctors': viewDiv.innerHTML = renderDoctors(params); break;
                case 'profile': viewDiv.innerHTML = renderProfile(params); break;

                case 'admin_faculty': viewDiv.innerHTML = renderAdminFaculty(); break;

            const content = document.getElementById('new-note-content').value.trim();
            if (!content) return showToast('Error', 'Note content cannot be empty.', true);
            
            if (!APP_STATE.notes) APP_STATE.notes = [];
            APP_STATE.notes.push({
                id: Date.now(),
                doctorId: APP_STATE.currentUser.id,
                content: content,
                date: new Date().toLocaleString()
            });
            saveState();
            showToast('Success', 'Clinical note saved securely.');
            renderView('doctor_notes');
        }

        function renderDoctorNotes() {
            const myNotes = (APP_STATE.notes || []).filter(n => n.doctorId === APP_STATE.currentUser.id).sort((a,b) => b.id - a.id);

            return `<div class="flex flex-col lg:flex-row min-h-screen bg-[#FDFCF6]">
                ${DashSidebar(DOCTOR_LINKS('notes'))}
                <main class="flex-1 pt-6 lg:pt-32 pb-24 px-6 lg:px-12">
                    <div class="max-w-5xl mx-auto space-y-10">
                        <header><span class="text-indigo-600 font-bold uppercase text-[10px] tracking-widest">Medical Documentation</span><h1 class="text-3xl md:text-5xl font-serif text-[#0F172A] mt-2">Clinical Notes</h1></header>
                        
                        <div class="bento-card p-8 bg-white/70 backdrop-blur-xl space-y-6">
                            <h3 class="text-xl font-serif text-[#0F172A]">Add New Entry</h3>
                            <textarea id="new-note-content" placeholder="Enter clinical observations, protocol adjustments, or diagnostic notes here..." class="w-full h-32 md:h-48 bg-slate-50 border border-slate-100 rounded-2xl p-4 md:p-6 outline-none focus:ring-2 focus:ring-indigo-600 resize-none font-medium text-slate-700"></textarea>
                            <div class="flex justify-end gap-4">
                                <button class="px-8 py-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-widest rounded-2xl shadow-xl hover:bg-indigo-700 transition-colors" onclick="saveNote()">Save Entry</button>
                            </div>
                        </div>

                        ${myNotes.length ? `
                        <div class="space-y-6">
                            <h3 class="text-xl font-serif text-[#0F172A]">Previous Entries</h3>
                            <div class="grid grid-cols-1 gap-4">
                                ${myNotes.map(note => `
                                <div class="bento-card p-6 bg-white border border-slate-100 hover:shadow-md transition-all">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center"><i data-lucide="file-text" class="w-4 h-4"></i></div>
                                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">${note.date}</span>
                                        </div>
                                    </div>
                                    <p class="text-slate-600 text-sm whitespace-pre-wrap leading-relaxed">${note.content}</p>
                                </div>`).join('')}
                            </div>
                        </div>` : ''}
                        
                    </div>
                </main>
            </div>`;
        }

        function renderAdminFaculty() {
            return `<div class="flex flex-col lg:flex-row min-h-screen bg-[#FDFCF6]">
                ${DashSidebar(ADMIN_LINKS('faculty'))}
                <main class="flex-1 pt-6 lg:pt-32 pb-24 px-6 lg:px-12">
                    <div class="max-w-6xl mx-auto space-y-10">
                        <header><span class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">Faculty Control</span><h1 class="text-3xl md:text-5xl font-serif text-[#0F172A] mt-2">Manage Practitioners</h1></header>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${DOCTORS.map(d => `<div class="bento-card p-6 flex flex-col group hover:shadow-xl transition-all cursor-pointer"><div class="flex items-center gap-4 mb-4"><img src="${d.image}" class="w-12 h-12 rounded-full object-cover shadow-sm"/><div class="font-bold text-[#0F172A] group-hover:text-teal-600 transition-colors">${d.name}</div></div><p class="text-[10px] uppercase font-bold text-slate-400 tracking-[0.2em]">${d.specialty}</p></div>`).join('')}
                        </div>
                    </div>
                </main>
            </div>`;
        }

        function renderAdminAudit() {
            return `<div class="flex flex-col lg:flex-row min-h-screen bg-[#FDFCF6]">
                ${DashSidebar(ADMIN_LINKS('audit'))}
                <main class="flex-1 pt-6 lg:pt-32 pb-24 px-6 lg:px-12">
                    <div class="max-w-5xl mx-auto space-y-10">
                        <header><span class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">System Overseer</span><h1 class="text-3xl md:text-5xl font-serif text-[#0F172A] mt-2">Security & Audit Logs</h1></header>
                        
                        <div class="bento-card p-8 bg-white/70 backdrop-blur-xl space-y-8">
                            <h3 class="text-xl font-serif text-[#0F172A]">Recent Security Events</h3>
                            <div class="space-y-4">
                                ${['Administrative Login', 'Faculty Data Edited', 'Patient Record Export', 'System Parameter Toggled', 'Invalid Authentication Attempt'].map((event, i) => `<div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:shadow-md transition-all"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-full ${i === 4 ? 'bg-red-50 text-red-600' : 'bg-slate-100 text-slate-600'} flex items-center justify-center"><i data-lucide="${i === 4 ? 'alert-triangle' : 'shield'}" class="w-4 h-4"></i></div><div><div class="font-bold text-[#0F172A] text-sm">${event}</div><div class="text-xs text-slate-400 mt-0.5">${new Date(Date.now() - i * 3600000).toLocaleString()} • IP: 192.168.1.${i + 10}</div></div></div><div class="text-right"><div class="text-[9px] uppercase tracking-widest font-bold ${i === 4 ? 'text-red-500' : 'text-slate-400'} mt-0.5">${i === 4 ? 'Blocked' : 'Authorized'}</div></div></div>`).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bento-card p-8 bg-white border border-slate-100">
                                <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Threat Detection</span>
                                <div class="mt-4 flex items-center gap-4"><div class="w-12 h-12 bg-green-50 text-green-600 rounded-xl flex items-center justify-center"><i data-lucide="check-shield" class="w-6 h-6"></i></div><div><div class="text-xl font-bold text-[#0F172A]">Zero Active Threats</div><div class="text-xs text-slate-400 mt-1">Network traffic is operating normally.</div></div></div>
                            </div>
                            <div class="bento-card p-8 bg-white border border-slate-100">
                                <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Data Privacy Protocol</span>
                                <div class="mt-4 flex flex-col justify-between h-full"><div class="text-sm font-medium text-slate-600">All patient records are end-to-end encrypted under standard protocol guidelines.</div><button class="mt-8 text-xs font-bold uppercase tracking-widest text-[#0F172A] hover:text-teal-600 transition-colors hidden sm:block text-left">Review Compliance →</button></div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>`;
        }

        function renderConfirmation() {
            return `<div class="min-h-screen pt-32 md:pt-40 flex items-center justify-center px-6"><div class="bento-card max-w-lg w-full p-8 md:p-12 text-center space-y-6 md:space-y-8"><div class="w-16 h-16 md:w-20 md:h-20 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mx-auto shadow-inner"><i data-lucide="check-circle" class="w-8 h-8 md:w-10 md:h-10"></i></div><h2 class="text-3xl md:text-4xl font-serif text-slate-900">Request <span class="italic text-teal-700">Submitted</span></h2><p class="text-slate-500 font-light leading-relaxed text-sm md:text-base">Your clinical session request has been forwarded.</p><button onclick="handleDashboardNavigation()" class="btn-aura bg-[#0F172A] text-white w-full py-4 rounded-full font-bold shadow-xl">Dashboard</button></div></div>`;
        }

        // --- Interaction Logic ---
        function selectSlot(slot) {
            window.selectedSlot = slot;
            document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.remove('bg-[#0F172A]', 'text-white', 'border-[#0F172A]', 'scale-105', 'shadow-xl'));
            const btnId = `slot-${slot.replace(/\s+/g, '').replace(':', '')}`;
            const btn = document.getElementById(btnId);
            if (btn) {
                btn.classList.add('bg-[#0F172A]', 'text-white', 'border-[#0F172A]', 'scale-105', 'shadow-xl');
                btn.classList.remove('bg-slate-50', 'text-slate-500');
            }
            const bookBtn = document.getElementById('book-btn');
            bookBtn.disabled = false;
            bookBtn.classList.remove('opacity-50');
        }

        function processBooking(doc) {
            const dateVal = document.getElementById('appointment-date').value;
            if (!dateVal) { showToast("Booking Failed", "Please provide a clinical date to secure your session.", true); return; }
            if (!APP_STATE.currentUser || APP_STATE.currentUser.role !== 'patient') { showToast("Identity Verification", "Please sign in to your Patient Portal to book a session.", true); return; }

            APP_STATE.appointments.push({
                id: Date.now(),
                doctorId: doc.id,
                patientName: APP_STATE.currentUser.name,
                slot: window.selectedSlot,
                date: dateVal,
                status: "Pending"
            });
            saveState();
            renderView('confirmation');
        }

        function updateAppointmentStatus(appId, newStatus) {
            const app = APP_STATE.appointments.find(a => a.id === appId);
            if (app) {
                app.status = newStatus;
                saveState();
            }
            handleDashboardNavigation();
        }

        function filterInRealTime(input) {
            const q = input.value.toLowerCase();
            const list = document.getElementById('doctor-list');
            if (!list) return;
            const filtered = DOCTORS.filter(d =>
                d.name.toLowerCase().includes(q) ||
                d.specialty.toLowerCase().includes(q) ||
                d.location.toLowerCase().includes(q) ||
                d.about.toLowerCase().includes(q)
            );
            list.innerHTML = filtered.map(doc => renderDoctorCard(doc)).join('');
            lucide.createIcons();
        }

        let sliderInterval;
        function startHeroSlider() {
            if (sliderInterval) clearInterval(sliderInterval);
            const items = document.querySelectorAll('.slider-item');
            if (!items.length) return;
            let current = 0;
            sliderInterval = setInterval(() => {
                items[current].classList.remove('active');
                current = (current + 1) % items.length;
                items[current].classList.add('active');
            }, 5000);
        }

        // --- Navbar Scroll Logic ---
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 20) {
                nav.classList.add('bg-white', 'shadow-md', 'border-b', 'border-slate-100');
                nav.classList.remove('bg-transparent', 'py-4', 'bg-white/90', 'backdrop-blur-xl');
                nav.classList.add('py-2');
            } else {
                nav.classList.remove('bg-white', 'shadow-md', 'border-b', 'border-slate-100');
                nav.classList.add('bg-transparent', 'py-4');
                nav.classList.remove('py-2');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderView('home');
        });
    </script>
</body>

</html>
